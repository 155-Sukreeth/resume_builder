<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Editor Sidebar -->
        <div class="editor-sidebar no-print">
            <div class="editor-header">
                <h2>Resume Builder</h2>
                <div class="header-actions">
                    <button id="save-draft-btn" class="btn btn-secondary">Save Draft</button>
                    <button id="export-pdf-btn" class="btn btn-primary">Export PDF (Backend)</button>
                </div>
            </div>

            <div class="form-container">
                <!-- Basic Info -->
                <section class="form-section">
                    <h3>Basic Information</h3>
                    <div class="form-group">
                        <label>Photo URL (Optional)</label>
                        <input type="text" id="photo-url" placeholder="https://example.com/photo.jpg" data-field="photo">
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="full-name" placeholder="John Doe" data-field="name">
                    </div>
                    <div class="form-group">
                        <label>Job Title</label>
                        <input type="text" id="job-title" placeholder="Software Engineer" data-field="title">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" id="phone" placeholder="+1 234 567 890" data-field="phone">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="john@example.com" data-field="email">
                    </div>
                    <div class="form-group">
                        <label>LinkedIn</label>
                        <input type="text" id="linkedin" placeholder="linkedin.com/in/johndoe" data-field="linkedin">
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="location" placeholder="New York, NY" data-field="location">
                    </div>
                </section>

                <!-- Summary -->
                <section class="form-section">
                    <h3>Summary</h3>
                    <div class="form-group">
                        <textarea id="summary" rows="4" placeholder="Brief professional summary..." data-field="summary"></textarea>
                    </div>
                </section>

                <!-- Skills -->
                <section class="form-section">
                    <h3>Skills</h3>
                    <p class="help-text">Enter skills separated by commas</p>
                    <div class="form-group">
                        <textarea id="skills" rows="3" placeholder="Python, JavaScript, React..." data-field="skills"></textarea>
                    </div>
                </section>

                <!-- Dynamic Sections Container -->
                <div id="dynamic-sections"></div>

                <div class="add-section-buttons">
                    <button class="btn btn-outline" onclick="addListSection('experience', 'Experience')">+ Add Experience</button>
                    <button class="btn btn-outline" onclick="addListSection('education', 'Education')">+ Add Education</button>
                    <button class="btn btn-outline" onclick="addListSection('projects', 'Project')">+ Add Project</button>
                    <button class="btn btn-outline" onclick="addListSection('certifications', 'Certification')">+ Add Certification</button>
                    <button class="btn btn-outline" onclick="addListSection('achievements', 'Achievement')">+ Add Achievement</button>
                </div>
            </div>
        </div>

        <!-- Resume Preview iframe -->
        <div class="preview-container" style="padding: 0; background: #525659; overflow: hidden;">
            <iframe id="preview-iframe" style="width: 100%; height: 100%; border: none; background: #525659;"></iframe>
        </div>
    </div>
    
    <!-- Template for list items in editor -->
    <template id="list-item-template">
        <div class="form-group list-item-editor">
            <div class="list-item-header">
                <span class="item-title-label">Item</span>
                <button class="remove-btn" onclick="this.closest('.list-item-editor').remove(); triggerPreviewUpdate();"><i class="fa-solid fa-trash"></i></button>
            </div>
            <input type="text" class="item-title" placeholder="Title">
            <input type="text" class="item-subtitle" placeholder="Subtitle / Company / Institution">
            <div class="row">
                <input type="text" class="item-date" placeholder="Date (e.g. 01/2023 - Present)">
                <input type="text" class="item-location" placeholder="Location">
            </div>
            <textarea class="item-desc" rows="3" placeholder="Description or bullet points (use '-' for bullets)"></textarea>
            <input type="text" class="item-extra" placeholder="GPA / Extra detail (optional)">
        </div>
    </template>

    <script src="js/app.js"></script>
</body>
</html>
